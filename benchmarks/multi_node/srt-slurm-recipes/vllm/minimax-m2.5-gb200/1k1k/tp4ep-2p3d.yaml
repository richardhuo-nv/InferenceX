name: "minimax-m2.5-vllm-disagg-gb200-1k1k-2p3xtp4ep"

# Better-matched tp4ep at 1k/1k.
# Measured X_tp4ep/P = 24.1k / 38k = 0.63; 2P:3D ratio = 0.67 ✓


model:
  path: "minimax-m2.5-nvfp4"
  container: "vllm/vllm-openai:v0.20.1"
  precision: "fp4"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

setup_script: install-deps.sh

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 3
  prefill_workers: 2
  decode_workers: 3
  gpus_per_prefill: 1
  gpus_per_decode: 4

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      trust-remote-code: true
      no-enable-prefix-caching: true
      max-model-len: 2048
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048
      stream-interval: 32

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 4
      enable-expert-parallel: true
      no-enable-prefix-caching: true
      max-model-len: 2048
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048
      gpu-memory-utilization: 0.90
      stream-interval: 32

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "256x1024"
  random_range_ratio: 0.8
