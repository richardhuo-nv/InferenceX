name: "minimax-m2.5-vllm-disagg-b300-decode-2p3xdep2"

model:
  path: "minimax-m2.5-nvfp4"
  container: "vllm/vllm-openai:v0.20.1"
  precision: "fp4"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

setup_script: install-deps.sh

resources:
  gpu_type: "b300"
  gpus_per_node: 8
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 2
  decode_workers: 3
  gpus_per_prefill: 1
  gpus_per_decode: 2
frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null
  allow_prefill_decode_colocation: true

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    UCX_TLS: "cuda_copy,rc"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    UCX_TLS: "cuda_copy,rc"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      trust-remote-code: true
      no-enable-prefix-caching: true
      max-model-len: 2048
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048
      stream-interval: 128

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      data-parallel-size: 2
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      no-enable-prefix-caching: true
      max-model-len: 2048
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048
      max-num-seqs: 864
      gpu-memory-utilization: 0.90
      stream-interval: 128

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "2048x4096"
  random_range_ratio: 0.8
