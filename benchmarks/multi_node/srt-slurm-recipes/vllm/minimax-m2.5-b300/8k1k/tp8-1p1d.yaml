name: "minimax-m2.5-vllm-disagg-b300-8k1k-1p1xtp8"

# B300-only: full-node TP=8 decode at 8k input. Cousin of tp4-1p1d.yaml
# but exercises the wider TP that B300's per-node GPU count makes
# available. Smallest concurrencies only (1,4,8).

model:
  path: "minimax-m2.5-nvfp4"
  container: "vllm/vllm-openai:v0.20.1"
  precision: "fp4"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

setup_script: install-deps.sh

resources:
  gpu_type: "b300"
  gpus_per_node: 8
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 1
  gpus_per_decode: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null
  allow_prefill_decode_colocation: true

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      trust-remote-code: true
      no-enable-prefix-caching: true
      max-model-len: 9280
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 16384
      stream-interval: 32

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 8
      enable-expert-parallel: false
      no-enable-prefix-caching: true
      max-model-len: 9280
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048
      gpu-memory-utilization: 0.90
      stream-interval: 32

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "4"
  random_range_ratio: 0.8
